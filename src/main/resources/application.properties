spring.application.name=SIGMAV2 Spring Boot


# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/SIGMAV2_2?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Tokai}
spring.jpa.hibernate.ddl-auto=update

# Flyway ? permitir DDL y DML mezclados en el mismo script (necesario para scripts idempotentes)
spring.flyway.mixed=true
# Permite aplicar migraciones con versión menor a las ya aplicadas (sin conflicto en re-organización de versiones)
spring.flyway.out-of-order=true
spring.jpa.show-sql=true

# Hibernate configuration for better datetime handling
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.type.preferred_instant_jdbc_type=TIMESTAMP

# Server
server.port=9090
# Hibernate
spring.jpa.properties.format_sql=false

security.jwt.key.private=${JWT_SECRET:C4S4RB4CkJND}
security.jwt.user.generator=${JWT_ISSUER:S1GM4V2}

# Intervalo de purga de tokens revocados (1 hora = 3600000 ms)
security.revocation.purge-interval-ms=3600000
server.address=0.0.0.0


spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:demexicotokai@gmail.com}
spring.mail.password=${MAIL_PASSWORD:pbko zjte apif ngyd}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Image upload configuration
app.image.require-personal-info=false
app.image.create-personal-info-if-missing=true

# Modulo Labels: directorio para archivo TXT de existencias
# Windows: C:/Sistemas/SIGMA/Documentos   Linux/Docker: /opt/sigma/documentos
app.labels.inventory-file.directory=${LABELS_DIR:C:/Sistemas/SIGMA/Documentos}

