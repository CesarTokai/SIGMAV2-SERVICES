spring.application.name=SIGMAV2 Spring Boot

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/sigmav2?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull
spring.datasource.username=root
spring.datasource.password=Tokai
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Hibernate configuration for better datetime handling
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.type.preferred_instant_jdbc_type=TIMESTAMP

# Server
server.port=8080
server.address=0.0.0.0

# Hibernate
spring.jpa.properties.format_sql=true

# JWT Security
security.jwt.key.private=K1H4jKmX9hsK4ZYNop2D4t1cJkBQJOY6VGAwYXnSME+2NpAJFLzgVAn8V4B6XxCeYVxaQJTR7bTDqcEIphE75Q==
security.jwt.user.generator=S1GM4V2
security.revocation.purge-interval-ms=3600000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tu@email.com
spring.mail.password=app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Image upload configuration
app.image.require-personal-info=false
app.image.create-personal-info-if-missing=true

# Logging
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.level.tokai.com.mx.SIGMAV2=DEBUG
